# Insert this before the "Build debug APK" step in .github/workflows/debug-apk.yml.
# First run:
#   .\trapwire-ops\scripts\windows\configure-github-debug-signing.ps1 -Repo paziske/sp.temp-main

      - name: Restore local debug keystore
        if: ${{ secrets.ANDROID_DEBUG_KEYSTORE_B64 != '' }}
        shell: bash
        run: |
          mkdir -p "$HOME/.android"
          echo "${{ secrets.ANDROID_DEBUG_KEYSTORE_B64 }}" | base64 --decode > "$HOME/.android/debug.keystore"
