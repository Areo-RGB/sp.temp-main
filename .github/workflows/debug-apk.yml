name: Debug APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-debug:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Restore local debug keystore
        shell: bash
        env:
          ANDROID_DEBUG_KEYSTORE_B64: ${{ secrets.ANDROID_DEBUG_KEYSTORE_B64 }}
        run: |
          if [ -z "$ANDROID_DEBUG_KEYSTORE_B64" ]; then
            echo "No debug keystore secret set; using runner default debug keystore."
            exit 0
          fi
          mkdir -p "$HOME/.android"
          printf '%s' "$ANDROID_DEBUG_KEYSTORE_B64" | tr -d '\r\n ' | base64 --decode --ignore-garbage > "$HOME/.android/debug.keystore"
      - name: Compute debug version
        id: debug_version
        shell: bash
        run: |
          version_code="$(date +%s)"
          echo "version_code=$version_code" >> "$GITHUB_OUTPUT"
          echo "version_name=debug-$version_code" >> "$GITHUB_OUTPUT"

      - name: Build debug APK
        working-directory: android
        run: ./gradlew :app:assembleDebug -PciVersionCode=${{ steps.debug_version.outputs.version_code }} -PciVersionName=${{ steps.debug_version.outputs.version_name }} -PupdateRepo=${{ github.repository }}

      - name: Prepare release files
        shell: bash
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk release/trapwire-debug.apk
          cat > release/trapwire-debug.json <<EOF
          {
            "versionCode": ${{ steps.debug_version.outputs.version_code }},
            "versionName": "${{ steps.debug_version.outputs.version_name }}",
            "apkAssetName": "trapwire-debug.apk",
            "commit": "${{ github.sha }}",
            "builtAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: trapwire-debug
          path: release/*

      - name: Publish latest debug release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: debug-latest
          name: Latest debug APK
          prerelease: true
          make_latest: false
          overwrite_files: true
          files: |
            release/trapwire-debug.apk
            release/trapwire-debug.json

